<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FWI Prediction</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;

}

.container{

width:1100px;
background:white;
border-radius:20px;
overflow:hidden;
display:flex;
box-shadow:0 15px 35px rgba(0,0,0,.3);

}

.left{

width:55%;
padding:40px;

}

.right{

width:45%;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
url("https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=900&q=80");

background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
padding:30px;

}

h1{

font-size:40px;
margin-bottom:20px;

}

input{

width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;

}

button{

width:100%;
padding:15px;
background:#2ecc71;
border:none;
color:white;
font-size:18px;
border-radius:8px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#27ae60;

}

.result{

margin-top:20px;
font-size:26px;
font-weight:bold;
color:#e74c3c;

}

</style>

</head>

<body>

<div class="container">

<div class="left">

<h1>🔥 FWI Prediction</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<input type="text" name="Temperature" placeholder="Temperature">

<input type="text" name="RH" placeholder="Relative Humidity">

<input type="text" name="Ws" placeholder="Wind Speed">

<input type="text" name="Rain" placeholder="Rain">

<input type="text" name="FFMC" placeholder="FFMC">

<input type="text" name="DMC" placeholder="DMC">

<input type="text" name="ISI" placeholder="ISI">

<input type="text" name="Classes" placeholder="Classes">

<input type="text" name="Region" placeholder="Region">

<button type="submit">Predict FWI</button>

</form>

<div class="result">

THE FWI Prediction is {{results}}

</div>

</div>

<div class="right">

<div>

<h1>Forest Fire Prediction</h1>

<p>

Predict forest fire danger using Machine Learning and weather parameters.

</p>

</div>

</div>

</div>

</body>
</html>
